<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VAT Calculator EU</title>

<meta name="description" content="Free VAT Calculator for Europe. Add VAT, remove VAT, or extract VAT from a total price instantly.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#5f9cff,#6d5dfc);
padding:20px;
display:flex;
justify-content:center;
}

.wrapper{
max-width:520px;
width:100%;
}

.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
margin-top:12px;
width:100%;
padding:14px;
background:linear-gradient(135deg,#4CAF50,#3fa047);
border:none;
color:white;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.secondary{
background:#333;
}

.result{
margin-top:18px;
font-weight:600;
font-size:17px;
text-align:center;
}

.info{
margin-top:30px;
color:#444;
font-size:14px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="card">

<h1>VAT Calculator EU</h1>

<p class="subtitle">
Calculate VAT instantly for European prices
</p>

<select id="country" onchange="setVAT()">

<option value="">Select country</option>
<option value="24">Greece (24%)</option>
<option value="19">Germany (19%)</option>
<option value="20">France (20%)</option>
<option value="21">Spain (21%)</option>
<option value="22">Italy (22%)</option>
<option value="21">Netherlands (21%)</option>
<option value="21">Belgium (21%)</option>
<option value="23">Portugal (23%)</option>

</select>

<input id="vatRate" placeholder="VAT rate (%)" readonly>

<input id="amount" type="number" placeholder="Amount (€)">

<select id="mode">

<option value="add">Add VAT</option>
<option value="remove">Remove VAT</option>
<option value="extract">Extract VAT from total</option>

</select>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<button class="secondary" onclick="copyResult()">Copy Result</button>

<button class="secondary" onclick="shareResult()">Share Result Link</button>

</div>

<div class="card info">

<h3>About this VAT Calculator</h3>

<p>
This free VAT calculator helps businesses, freelancers, and consumers calculate VAT quickly across European countries.
</p>

<p>
You can add VAT to a price, remove VAT, or extract VAT from a VAT-inclusive amount.
</p>

</div>

</div>

<script>

function setVAT(){

let country=document.getElementById("country").value;

if(country){
document.getElementById("vatRate").value=country+"%";
}else{
document.getElementById("vatRate").value="";
}

}

function calculate(){

let amount=parseFloat(document.getElementById("amount").value);

let vat=parseFloat(document.getElementById("vatRate").value);

let mode=document.getElementById("mode").value;

if(isNaN(amount)||isNaN(vat)){
document.getElementById("result").innerHTML="Enter amount and country";
return;
}

let vatAmount;
let total;
let net;

if(mode==="add"){

vatAmount=amount*(vat/100);
total=amount+vatAmount;

document.getElementById("result").innerHTML=
"VAT: €"+vatAmount.toFixed(2)+"<br>Total: €"+total.toFixed(2);

}

else if(mode==="remove"){

net=amount/(1+vat/100);
vatAmount=amount-net;

document.getElementById("result").innerHTML=
"Net: €"+net.toFixed(2)+"<br>VAT: €"+vatAmount.toFixed(2);

}

else{

net=amount/(1+vat/100);
vatAmount=amount-net;

document.getElementById("result").innerHTML=
"VAT in total: €"+vatAmount.toFixed(2)+"<br>Net: €"+net.toFixed(2);

}

}

function copyResult(){

navigator.clipboard.writeText(
document.getElementById("result").innerText
);

alert("Result copied");

}

function shareResult(){

let amount=document.getElementById("amount").value;
let vat=document.getElementById("vatRate").value;

let link=window.location.href+"?amount="+amount+"&vat="+vat;

navigator.clipboard.writeText(link);

alert("Share link copied");

}

</script>

</body>
</html>
