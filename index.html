<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VAT Calculator EU – Add or Remove VAT</title>

<meta name="description" content="Free EU VAT calculator. Add VAT or remove VAT from prices instantly. Supports major European VAT rates.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#5f9cff,#6d5dfc);
padding:20px;
display:flex;
justify-content:center;
}

.wrapper{
max-width:520px;
width:100%;
}

.card{
background:white;
padding:32px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
margin-bottom:20px;
}

h1{
text-align:center;
margin-bottom:6px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

input:focus,select:focus{
outline:none;
border-color:#6d5dfc;
box-shadow:0 0 0 2px rgba(109,93,252,0.2);
}

button{
margin-top:12px;
width:100%;
padding:14px;
background:linear-gradient(135deg,#4CAF50,#3fa047);
border:none;
color:white;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.secondary{
background:#333;
}

.result{
margin-top:18px;
font-weight:600;
font-size:18px;
text-align:center;
padding:15px;
background:#f5f6ff;
border-radius:10px;
}

.info{
margin-top:30px;
color:#444;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

td,th{
padding:8px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="card">

<h1>VAT Calculator EU</h1>

<p class="subtitle">
Add or remove VAT from any amount
</p>

<select id="country">

<option value="">Select country</option>
<option value="24">Greece (24%)</option>
<option value="19">Germany (19%)</option>
<option value="20">France (20%)</option>
<option value="21">Spain (21%)</option>
<option value="22">Italy (22%)</option>
<option value="21">Netherlands (21%)</option>
<option value="21">Belgium (21%)</option>
<option value="23">Portugal (23%)</option>

</select>

<input id="vatRate" placeholder="VAT rate %" readonly>

<input id="amount" type="number" placeholder="Amount (€)">

<select id="mode">
<option value="add">Add VAT</option>
<option value="remove">Remove VAT</option>
</select>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<button class="secondary" onclick="copyResult()">Copy Result</button>

<button class="secondary" onclick="shareResult()">Copy Share Link</button>

</div>

<div class="card info">

<h3>About this VAT Calculator</h3>

<p>
This free VAT calculator helps businesses, freelancers, and consumers calculate VAT quickly across European countries.
</p>

<h3>Common EU VAT Rates</h3>

<table>

<tr><th>Country</th><th>VAT</th></tr>
<tr><td>Germany</td><td>19%</td></tr>
<tr><td>France</td><td>20%</td></tr>
<tr><td>Spain</td><td>21%</td></tr>
<tr><td>Italy</td><td>22%</td></tr>
<tr><td>Greece</td><td>24%</td></tr>
<tr><td>Portugal</td><td>23%</td></tr>

</table>

</div>

</div>

<script>

const amountInput=document.getElementById("amount");
const vatInput=document.getElementById("vatRate");
const countrySelect=document.getElementById("country");
const modeSelect=document.getElementById("mode");
const resultBox=document.getElementById("result");

function formatCurrency(value){
return new Intl.NumberFormat('en-EU',{
style:'currency',
currency:'EUR'
}).format(value);
}

countrySelect.addEventListener("change",()=>{
vatInput.value=countrySelect.value;
calculate();
});

amountInput.addEventListener("input",calculate);
modeSelect.addEventListener("change",calculate);

amountInput.addEventListener("keypress",(e)=>{
if(e.key==="Enter") calculate();
});

function calculate(){

const amount=parseFloat(amountInput.value);
const vat=parseFloat(vatInput.value);
const mode=modeSelect.value;

if(!amount||!vat){
resultBox.innerHTML="Enter amount and select country";
return;
}

let vatAmount;
let total;
let net;

if(mode==="add"){

vatAmount=amount*(vat/100);
total=amount+vatAmount;

resultBox.innerHTML=
`VAT: ${formatCurrency(vatAmount)}<br>Total: ${formatCurrency(total)}`;

}

if(mode==="remove"){

net=amount/(1+vat/100);
vatAmount=amount-net;

resultBox.innerHTML=
`Net: ${formatCurrency(net)}<br>VAT: ${formatCurrency(vatAmount)}`;

}

}

function copyResult(){

navigator.clipboard.writeText(resultBox.innerText);

alert("Result copied");

}

function shareResult(){

const amount=amountInput.value;
const vat=vatInput.value;
const mode=modeSelect.value;

const url=`${location.origin}${location.pathname}?amount=${amount}&vat=${vat}&mode=${mode}`;

navigator.clipboard.writeText(url);

alert("Share link copied");

}

function loadFromURL(){

const params=new URLSearchParams(window.location.search);

const amount=params.get("amount");
const vat=params.get("vat");
const mode=params.get("mode");

if(amount) amountInput.value=amount;
if(vat) vatInput.value=vat;
if(mode) modeSelect.value=mode;

calculate();

}

loadFromURL();

</script>

</body>
</html>
